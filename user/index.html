<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* New Grid Layout for Quiz Sets */
        #quiz-set-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        /* Modern Quiz Set Card (HSK Style) */
        .quiz-set-card {
            background: #f5f6f8;
            border: 2px solid transparent;
            padding: 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            min-height: 160px;
        }

        .quiz-set-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.05);
            border-color: #e0e4e8;
        }

        /* Card Watermark & Decor */
        .quiz-card-watermark {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 40px;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.03);
            pointer-events: none;
            z-index: 0;
            user-select: none;
        }

        /* Card Content */
        .quiz-card-content {
            position: relative;
            z-index: 1;
            flex-grow: 1;
        }

        .quiz-card-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quiz-card-info-item {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
            font-weight: 500;
        }

        /* Start Button inside Card */
        .quiz-start-btn {
            align-self: flex-end;
            margin-top: auto;
            background-color: #2c3e50;
            /* Xanh đen */
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            position: relative;
            z-index: 2;
        }

        .quiz-start-btn:hover {
            background-color: #1a252f;
        }

        .quiz-start-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="../" style="text-decoration: none; color: #007bff;">← Back to Main</a>

        <!-- Màn hình 1: Nhập tên và Chọn bộ đề -->
        <div id="start-screen">
            <h1>Welcome to practice test</h1>
            <div class="form-group" style="max-width: 400px; margin-bottom: 30px;">
                <label for="user-name" style="font-weight: 600; color: #333;">Enter your name pls:</label>
                <input type="text" id="user-name" class="form-control" placeholder="Ví dụ: nguyet"
                    style="border-radius: 8px; border: 1px solid #ccc; padding: 10px;">
            </div>
            <div class="form-group">
                <label style="font-weight: bold; font-size: 18px;">Select your test:</label>
                <div id="quiz-set-list">
                    <p>Loading tests...</p>
                </div>
            </div>
            <!-- Global START button was removed here -->
        </div>

        <!-- Màn hình 2: Làm bài thi -->
        <div id="quiz-screen" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="welcome-user">Your test</h2>
                <h3>Time: <span id="timer">00:00</span></h3>
            </div>
            <h3 id="quiz-set-title"></h3>
            <form id="quiz-form"></form>
        </div>

        <!-- Màn hình 3: Kết quả -->
        <div id="result-screen" style="display:none;">
            <!-- Nội dung màn hình kết quả giữ nguyên như cũ -->
        </div>
    </div>

    <!-- SDKs and Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="js/user.js?v=2"></script>
</body>

</html>
