<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật ký Hoạt động (Audit Logs)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../auth.js"></script>
    <style>
        body {
            background-color: #0b1437;
            color: #fff;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header-bar {
            background: #1e293b;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .main-container {
            flex: 1;
            padding: 30px;
            display: flex;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .panel {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px 32px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th {
            color: #94a3b8;
            font-weight: 600;
            background: rgba(255,255,255,0.02);
            position: sticky;
            top: 0;
        }
        .btn-back {
            background: rgba(244, 63, 94, 0.1);
            color: #f43f5e;
            border: 1px solid rgba(244, 63, 94, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-back:hover {
            background: rgba(244, 63, 94, 0.2);
        }
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .tag-add { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .tag-update { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .tag-delete { background: rgba(244, 63, 94, 0.15); color: #f43f5e; }
        .tag-role { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
        .tag-other { background: rgba(148, 163, 184, 0.15); color: #94a3b8; }
        
        .role-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 6px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header-bar">
        <h2 style="margin: 0; color: white; font-size: 20px; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-history" style="color: #10b981;"></i> Nhật ký Hoạt động (Audit Logs)
        </h2>
        <a href="index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Quay lại Dashboard
        </a>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        
        <div class="panel list-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h4 style="color: #cbd5e1; margin-top: 0; margin-bottom: 0; font-size: 18px;">Lịch sử thao tác (100 dòng mới nhất)</h4>
                <div style="color: #94a3b8; font-size: 13px;">
                    <i class="fas fa-info-circle"></i> Chỉ Admin mới xem được bảng này.
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th width="150px">Thời gian</th>
                        <th width="180px">Nhân viên</th>
                        <th width="150px">Loại hành động</th>
                        <th>Chi tiết</th>
                    </tr>
                </thead>
                <tbody id="logsTbody">
                    <tr><td colspan="4" style="text-align: center; color: #64748b; padding: 20px;">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>

    </main>

    <!-- Page Script -->
    <script src="logs.js"></script>
</body>
</html>
