<!-- /admin/discuss.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản lý Thảo luận</title>
    <link rel="stylesheet" href="../style.css">
    <!-- Quill CSS cho preview -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .ql-snow .ql-editor { padding: 0; min-height: auto; }
        .danger-text { color: red; cursor: pointer; }
        .danger-text:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quản lý Thảo luận (Internal Q&A)</h1>
        <div id="admin-nav-container"></div>

        <main>
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>Tiêu đề</th>
                        <th>Người đăng</th>
                        <th>Ngày tạo</th>
                        <th>Bình luận</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="discussions-list">
                    <tr><td colspan="5" style="text-align: center;">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </main>
    </div>

    <!-- Modal for Result Details -->
    <div id="discuss-detail-modal" class="modal">
        <div class="modal-content" style="max-width: 800px; height: 90vh; display: flex; flex-direction: column;">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Chi tiết Câu hỏi</h2>
            
            <div style="flex-grow: 1; overflow-y: auto; padding-right: 15px;">
                <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <h3><strong id="detail-title">Title</strong></h3>
                    <p style="font-size: 0.9em; color: #6c757d;">Đăng bởi: <strong id="detail-author">Author</strong> lúc <span id="detail-time">Time</span></p>
                    <hr>
                    <div id="detail-content" class="ql-editor ql-snow" style="margin-top: 15px;"></div>
                </div>

                <h3>Các bình luận (<span id="detail-reply-count">0</span>)</h3>
                <div id="detail-comments-container">
                    <!-- Bình luận sẽ hiển thị ở đây -->
                </div>
            </div>
            
            <div class="modal-footer" style="text-align: right;">
                <button id="btn-delete-discussion" class="btn btn-danger">Xóa toàn bộ câu hỏi (bao gồm bình luận)</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Firebase Config & Scripts -->
    <script src="../firebase-config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/discuss.js"></script>
</body>
</html>
